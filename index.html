<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduBite – 5 Minute Learning App. Microlearning made fun and effective.">
  <title>EduBite – 5 Minute Learning</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #58CC02;
      --primary-dark: #46a302;
      --bg: #F7F7F7;
      --white: #FFFFFF;
      --text: #1a1a2e;
      --text-muted: #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .splash-container {
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .logo-circle {
      width: 120px;
      height: 120px;
      background: linear-gradient(145deg, #58CC02, #46a302);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 12px 40px rgba(88, 204, 2, 0.3);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .logo-circle span {
      font-size: 56px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    .splash-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .splash-sub {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    .loader-bar {
      width: 200px;
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      margin: 40px auto 0;
      overflow: hidden;
    }

    .loader-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #58CC02, #7de836);
      border-radius: 3px;
      animation: load 1.8s ease-in-out forwards;
    }

    @keyframes load {
      0% { width: 0%; }
      60% { width: 70%; }
      100% { width: 100%; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-circle">
      <span>🧠</span>
    </div>
    <h1 class="splash-title">EduBite</h1>
    <p class="splash-sub">5 Minute Learning App</p>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <script>
    /* ============================================
       INDEX.HTML — Session Check & Redirect
       ============================================ */

    /**
     * Seeds default data into localStorage if not present.
     * Uses versioning to force re-seed when data structure changes.
     */
    function seedData() {
      const DATA_VERSION = 'v4';
      const currentVersion = localStorage.getItem('dataVersion');
      const existingLessons = JSON.parse(localStorage.getItem('lessons') || '[]');

      // Seed default user (only if no users at all)
      if (!localStorage.getItem('users')) {
        const defaultUsers = [
          {
            id: 'user_default_001',
            email: 'test@edubite.com',
            password: '123456'
          }
        ];
        localStorage.setItem('users', JSON.stringify(defaultUsers));
      }

      // Re-seed if version changed OR if lessons are missing/empty
      if (currentVersion !== DATA_VERSION || existingLessons.length === 0) {
        seedLessons();
        seedQuizzes();
        migrateProgress();
        localStorage.setItem('dataVersion', DATA_VERSION);
      }
    }

    /**
     * Migrates existing progress records to include new fields (energy, coins).
     */
    function migrateProgress() {
      let allProgress = JSON.parse(localStorage.getItem('progress') || '[]');
      allProgress = allProgress.map(p => ({
        ...p,
        energy: p.energy !== undefined ? p.energy : 20,
        coins: p.coins !== undefined ? p.coins : 0,
        lastEnergyRefill: p.lastEnergyRefill || Date.now()
      }));
      localStorage.setItem('progress', JSON.stringify(allProgress));
    }

          },
          {
            id: 2,
            title: 'Photosynthesis Explained',

            content: 'Photosynthesis is the process by which green plants, algae, and some bacteria convert light energy into chemical energy. Using sunlight, water (H₂O), and carbon dioxide (CO₂), plants produce glucose (C₆H₁₂O₆) and release oxygen (O₂) as a byproduct. This process occurs mainly in the chloroplasts of plant cells, where chlorophyll absorbs light. Photosynthesis is essential for life on Earth — it produces the oxygen we breathe and forms the base of most food chains.',
            dayNumber: 2
          },
          {
            id: 3,
            title: 'Introduction to DNA',
            category: 'Science',
            content: 'DNA (Deoxyribonucleic Acid) is the molecule that carries genetic instructions for the development, functioning, and reproduction of all living organisms. It has a double-helix structure, resembling a twisted ladder. The "rungs" of the ladder are made of base pairs: Adenine (A) pairs with Thymine (T), and Cytosine (C) pairs with Guanine (G). The sequence of these bases determine the genetic code that makes each organism unique.',
            dayNumber: 3
          },
          {
            id: 4,
            title: 'The Water Cycle',
            category: 'Science',
            content: 'The water cycle describes how water moves continuously through Earth\'s systems. It begins with evaporation, where the sun heats surface water, turning it into vapor. This vapor rises and cools, forming clouds through condensation. When clouds become heavy, precipitation occurs as rain, snow, or hail. Water then collects in rivers, lakes, and oceans, or seeps into the ground as groundwater. The cycle repeats endlessly, sustaining ecosystems worldwide.',
            dayNumber: 4
          },
          {
            id: 5,
            title: 'Basics of Electricity',
            category: 'Science',
            content: 'Electricity is the flow of electrons through a conductor, typically a wire. It is measured in volts (V), amperes (A), and watts (W). There are two types: Direct Current (DC), where electrons flow in one direction, and Alternating Current (AC), where electrons change direction periodically. AC is used in homes and businesses because it transmits efficiently over long distances. Components like resistors, capacitors, and transistors control electrical flow in circuits.',

          {
            id: 6,
            title: 'Human Memory Types',
            category: 'Science',
            content: 'Human memory is broadly classified into three types: Sensory Memory holds fleeting impressions from our senses for a few seconds. Short-Term Memory (or Working Memory) retains about 7 items for roughly 20–30 seconds, allowing us to process information actively. Long-Term Memory stores information indefinitely — it includes Explicit Memory (facts and events we consciously recall) and Implicit Memory (skills and habits we perform automatically). Sleep plays a critical role in consolidating short-term memories into long-term storage.',

          },

            id: 7,
            title: 'Atoms & Elements',
            category: 'Science',
            content: 'Everything in the universe is made of atoms — the smallest unit of matter that retains the properties of an element. An atom consists of a nucleus (containing protons and neutrons) surrounded by electrons orbiting in shells. The number of protons defines the element: Hydrogen has 1, Carbon has 6, Oxygen has 8. The Periodic Table organizes all 118 known elements by atomic number. Elements combine to form molecules — for example, two hydrogen atoms and one oxygen atom make water (H₂O).',

    /**
     * Checks if a user session exists and redirects accordingly.
     */
    function checkSessionAndRedirect() {
      const currentUser = localStorage.getItem('currentUser');
      setTimeout(() => {
        if (currentUser) {
          window.location.href = 'home.html';
        } else {
          window.location.href = 'login.html';

      }, 2000); // Allow splash animation to play
