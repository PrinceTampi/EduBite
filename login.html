<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to EduBite – your daily microlearning companion.">
  <title>Login – EduBite</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #58CC02;
      --primary-dark: #46a302;
      --primary-light: #d4f5b0;
      --bg: #F7F7F7;
      --white: #FFFFFF;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --danger: #ef4444;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.06);
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.5s ease;
    }

    /* ---- Header ---- */
    .auth-header {
      text-align: center;
      padding: 48px 0 40px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #58CC02, #46a302);
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(88, 204, 2, 0.25);
      margin-bottom: 24px;
    }

    .auth-header h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 8px;
      font-weight: 500;
    }

    /* ---- Card ---- */
    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
    }

    /* ---- Form ---- */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(88, 204, 2, 0.12);
    }

    .form-group input::placeholder {
      color: #9ca3af;
    }

    /* ---- Button ---- */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(145deg, #58CC02, #4cb801);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(88, 204, 2, 0.3);
      margin-top: 8px;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(88, 204, 2, 0.4);
    }

    /* ---- Error ---- */
    .error-msg {
      background: #fef2f2;
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      display: none;
      animation: shake 0.4s ease;
    }

    /* ---- Footer Link ---- */
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 15px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 700;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* ---- Demo hint ---- */
    .demo-hint {
      text-align: center;
      margin-top: 32px;
      padding: 16px;
      background: var(--primary-light);
      border-radius: 12px;
      font-size: 13px;
      color: var(--primary-dark);
      font-weight: 600;
      line-height: 1.6;
    }

    .demo-hint span {
      display: block;
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      color: var(--primary-dark);
    }

    /* ---- Animations ---- */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="auth-header">
      <div class="logo-icon">🧠</div>
      <h1>Welcome back!</h1>
      <p>Sign in to continue learning</p>
    </div>

    <div class="auth-card">
      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
      </form>
    </div>

    <p class="auth-footer">
      Don't have an account? <a href="register.html">Sign Up</a>
    </p>

    <div class="demo-hint">
      <span>Demo Account</span>
      test@edubite.com &nbsp;/&nbsp; 123456
    </div>
  </div>

  <script>
    /* ============================================
       LOGIN.HTML — User Authentication
       ============================================ */

    /**
     * Displays an error message with animation.
     */
    function showError(message) {
      const el = document.getElementById('errorMsg');
      el.textContent = message;
      el.style.display = 'block';
      // Re-trigger shake animation
      el.style.animation = 'none';
      el.offsetHeight; // force reflow
      el.style.animation = 'shake 0.4s ease';
    }

    /**
     * Hides the error message.
     */
    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    /**
     * Validates login credentials against stored users.
     * On success, creates session and redirects to home.
     */
    function handleLogin(e) {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if (!user) {
        showError('Invalid email or password. Please try again.');
        return;
      }

      // Create session
      const session = { id: user.id, email: user.email };
      localStorage.setItem('currentUser', JSON.stringify(session));

      // Initialize progress if not exists
      initializeProgress(user.id);

      // Redirect with brief delay for UX feel
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 600);
    }

    /**
     * Creates a progress record for new users.
     */
    function initializeProgress(userId) {
      let allProgress = JSON.parse(localStorage.getItem('progress') || '[]');
      const exists = allProgress.find(p => p.userId === userId);
      if (!exists) {
        allProgress.push({
          userId: userId,
          completedLessons: [],
          totalScore: 0,
          streak: 0,
          lastAccess: null,
          energy: 20,
          coins: 0,
          lastEnergyRefill: Date.now()
        });
        localStorage.setItem('progress', JSON.stringify(allProgress));
      }
    }

    // If already logged in, redirect
    if (localStorage.getItem('currentUser')) {
      window.location.href = 'home.html';
    }

    // Bind form submit
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
