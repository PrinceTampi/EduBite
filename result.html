<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduBite Quiz Results – See how you scored and track your progress.">
  <title>Results – EduBite</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #58CC02;
      --primary-dark: #46a302;
      --primary-light: #d4f5b0;
      --bg: #F7F7F7;
      --white: #FFFFFF;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.06);
      --radius: 16px;
      --orange: #ff9500;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 420px;
      padding: 0 16px;
      animation: fadeIn 0.4s ease;
    }

    /* ---- Result Hero ---- */
    .result-hero {
      text-align: center;
      padding: 56px 0 40px;
    }

    .result-emoji {
      font-size: 80px;
      animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-bottom: 16px;
    }

    .result-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .result-sub {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ---- Score Ring ---- */
    .score-ring-section {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
      animation: scaleIn 0.5s ease 0.2s both;
    }

    .score-ring {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .score-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .score-ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 10;
    }

    .score-ring-fill {
      fill: none;
      stroke: var(--primary);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 502;
      stroke-dashoffset: 502;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
    }

    .score-ring-fill.low {
      stroke: var(--danger);
    }

    .score-ring-fill.medium {
      stroke: var(--orange);
    }

    .score-ring-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .score-ring-value {
      font-size: 44px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }

    .score-ring-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ---- Stats Row ---- */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
      animation: slideUp 0.5s ease 0.3s both;
    }

    .result-stat {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 12px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .result-stat-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .result-stat-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .result-stat-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }

    /* ---- Streak Banner ---- */
    .streak-banner {
      background: linear-gradient(145deg, #fff8f0, #fff3e0);
      border: 2px solid #ffe0b2;
      border-radius: 20px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      animation: slideUp 0.5s ease 0.4s both;
    }

    .streak-fire {
      font-size: 48px;
      animation: flamePulse 1.5s ease-in-out infinite;
    }

    .streak-info h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .streak-info p {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ---- Buttons ---- */
    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 48px;
      animation: slideUp 0.5s ease 0.5s both;
    }

    .btn-primary {
      width: 100%;
      padding: 18px;
      background: linear-gradient(145deg, #58CC02, #4cb801);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(88, 204, 2, 0.35);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-secondary {
      width: 100%;
      padding: 18px;
      background: var(--white);
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }

    .btn-secondary:active {
      transform: scale(0.97);
    }

    .btn-secondary:hover {
      background: var(--bg);
    }

    /* ---- Confetti ---- */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    /* ---- Animations ---- */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes bounceIn {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes flamePulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.1) rotate(-5deg); }
      75% { transform: scale(1.05) rotate(5deg); }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="confetti-container" id="confetti"></div>

  <div class="page">
    <!-- Hero -->
    <div class="result-hero">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <h1 class="result-title" id="resultTitle">Lesson Complete!</h1>
      <p class="result-sub" id="resultSub">Great effort on today's lesson</p>
    </div>

    <!-- Score Ring -->
    <div class="score-ring-section">
      <div class="score-ring">
        <svg viewBox="0 0 180 180">
          <circle class="score-ring-bg" cx="90" cy="90" r="80" />
          <circle class="score-ring-fill" id="scoreRing" cx="90" cy="90" r="80" />
        </svg>
        <div class="score-ring-center">
          <div class="score-ring-value" id="scoreDisplay">0/0</div>
          <div class="score-ring-label">Score</div>
        </div>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="result-stat">
        <div class="result-stat-icon">✅</div>
        <div class="result-stat-value" id="correctCount">0</div>
        <div class="result-stat-label">Correct</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-icon">❌</div>
        <div class="result-stat-value" id="wrongCount">0</div>
        <div class="result-stat-label">Wrong</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-icon">💰</div>
        <div class="result-stat-value" id="coinsEarned">+0</div>
        <div class="result-stat-label">Coins</div>
      </div>
    </div>

    <!-- Streak Banner -->
    <div class="streak-banner">
      <div class="streak-fire">🔥</div>
      <div class="streak-info">
        <h3 id="streakText">0-day streak!</h3>
        <p id="streakSub">Keep it up!</p>
      </div>
    </div>

    <!-- Buttons -->
    <div class="result-actions">
      <button class="btn-primary" onclick="goHome()">Continue Learning →</button>
      <button class="btn-secondary" onclick="retryQuiz()">Retry Quiz 🔄</button>
    </div>
  </div>

  <script>
    /* ============================================
       RESULT.HTML — Quiz Results & Progress Update
       ============================================ */

    /**
     * Authentication guard.
     */
    function checkAuth() {
      const currentUser = localStorage.getItem('currentUser');
      if (!currentUser) {
        window.location.href = 'login.html';
        return null;
      }
      return JSON.parse(currentUser);
    }

    /**
     * Checks if two dates are consecutive days.
     */
    function isYesterday(timestamp) {
      const lastDate = new Date(timestamp);
      const today = new Date();

      // Normalize to date-only (strip time)
      const lastDay = new Date(lastDate.getFullYear(), lastDate.getMonth(), lastDate.getDate());
      const todayDay = new Date(today.getFullYear(), today.getMonth(), today.getDate());

      const diffMs = todayDay - lastDay;
      const diffDays = diffMs / (1000 * 60 * 60 * 24);

      return diffDays === 1;
    }

    /**
     * Checks if a timestamp is from today.
     */
    function isToday(timestamp) {
      const date = new Date(timestamp);
      const today = new Date();
      return date.getFullYear() === today.getFullYear()
          && date.getMonth() === today.getMonth()
          && date.getDate() === today.getDate();
    }

    /**
     * Updates user progress in localStorage.
     */
    function updateProgress(userId, result) {
      let allProgress = JSON.parse(localStorage.getItem('progress') || '[]');
      let progressIndex = allProgress.findIndex(p => p.userId === userId);

      if (progressIndex === -1) {
        allProgress.push({
          userId: userId,
          completedLessons: [],
          totalScore: 0,
          streak: 0,
          lastAccess: null,
          energy: 20,
          coins: 0,
          lastEnergyRefill: Date.now()
        });
        progressIndex = allProgress.length - 1;
      }

      const progress = allProgress[progressIndex];

      // Add completed lesson (no duplicates)
      if (!progress.completedLessons.includes(result.lessonId)) {
        progress.completedLessons.push(result.lessonId);
      }

      // Update total score
      progress.totalScore += result.score;

      // Award coins based on performance
      const percent = Math.round((result.score / result.total) * 100);
      let coinsEarned = 2; // Base reward
      if (percent === 100) coinsEarned = 10;
      else if (percent >= 60) coinsEarned = 5;
      progress.coins = (progress.coins || 0) + coinsEarned;
      result.coinsEarned = coinsEarned; // attach for display

      // Restore 2 energy on quiz completion (max 20)
      progress.energy = Math.min(20, (progress.energy || 0) + 2);

      // Update streak logic
      if (progress.lastAccess) {
        if (isToday(progress.lastAccess)) {
          // Same day — streak stays
        } else if (isYesterday(progress.lastAccess)) {
          // Consecutive day — streak +1
          progress.streak += 1;
        } else {
          // Streak broken — reset to 1
          progress.streak = 1;
        }
      } else {
        // First ever access
        progress.streak = 1;
      }

      // Save last access timestamp
      progress.lastAccess = Date.now();

      // Persist
      allProgress[progressIndex] = progress;
      localStorage.setItem('progress', JSON.stringify(allProgress));

      return { progress, coinsEarned };
    }

    /**
     * Creates confetti particles.
     */
    function spawnConfetti() {
      const container = document.getElementById('confetti');
      const colors = ['#58CC02', '#ff9500', '#3b82f6', '#8b5cf6', '#ef4444', '#f59e0b'];

      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = Math.random() * 8 + 6 + 'px';
        piece.style.height = Math.random() * 8 + 6 + 'px';
        piece.style.animationDuration = Math.random() * 2 + 2 + 's';
        piece.style.animationDelay = Math.random() * 1 + 's';
        container.appendChild(piece);
      }

      // Cleanup after animation
      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }

    /**
     * Gets a motivational message based on score percentage.
     */
    function getMotivation(percent) {
      if (percent === 100) return { emoji: '🏆', title: 'Perfect Score!', sub: 'Outstanding performance! You\'re a natural!' };
      if (percent >= 80) return { emoji: '🎉', title: 'Excellent Work!', sub: 'You really know your stuff!' };
      if (percent >= 60) return { emoji: '👍', title: 'Good Job!', sub: 'Solid effort, keep learning!' };
      if (percent >= 40) return { emoji: '💪', title: 'Keep Trying!', sub: 'Practice makes perfect!' };
      return { emoji: '📖', title: 'Room to Grow', sub: 'Review the lesson and try again!' };
    }

    /**
     * Goes to home page.
     */
    function goHome() {
      window.location.href = 'home.html';
    }

    /**
     * Retries the current quiz.
     */
    function retryQuiz() {
      window.location.href = 'quiz.html';
    }

    /**
     * Initializes the result page.
     */
    function initResult() {
      const user = checkAuth();
      if (!user) return;

      const result = JSON.parse(localStorage.getItem('quizResult'));
      if (!result) {
        window.location.href = 'home.html';
        return;
      }

      const percent = Math.round((result.score / result.total) * 100);
      const motivation = getMotivation(percent);

      // Update progress
      const { progress, coinsEarned } = updateProgress(user.id, result);

      // Confetti for good scores
      if (percent >= 60) {
        spawnConfetti();
      }

      // Hero
      document.getElementById('resultEmoji').textContent = motivation.emoji;
      document.getElementById('resultTitle').textContent = motivation.title;
      document.getElementById('resultSub').textContent = `${result.lessonTitle} — ${motivation.sub}`;

      // Score ring
      document.getElementById('scoreDisplay').textContent = `${result.score}/${result.total}`;
      document.getElementById('correctCount').textContent = result.score;
      document.getElementById('wrongCount').textContent = result.total - result.score;
      document.getElementById('coinsEarned').textContent = `+${coinsEarned}`;

      // Animate ring
      const circumference = 2 * Math.PI * 80; // ~502
      const offset = circumference - (percent / 100) * circumference;
      const ring = document.getElementById('scoreRing');
      if (percent < 40) ring.classList.add('low');
      else if (percent < 70) ring.classList.add('medium');
      setTimeout(() => {
        ring.style.strokeDashoffset = offset;
      }, 100);

      // Streak
      document.getElementById('streakText').textContent = `${progress.streak}-day streak!`;
      if (progress.streak >= 7) {
        document.getElementById('streakSub').textContent = '🏆 One week streak! Amazing!';
      } else if (progress.streak >= 3) {
        document.getElementById('streakSub').textContent = '🌟 You\'re on fire! Keep going!';
      } else {
        document.getElementById('streakSub').textContent = 'Complete a lesson daily to build your streak!';
      }

      // Clear quiz result so it can't be re-submitted
      localStorage.removeItem('quizResult');
    }

    // Initialize
    initResult();
  </script>
</body>
</html>
