<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduBite Profile – View your learning stats, progress, and achievements.">
  <title>Profile – EduBite</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #58CC02;
      --primary-dark: #46a302;
      --primary-light: #d4f5b0;
      --bg: #F7F7F7;
      --white: #FFFFFF;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.06);
      --radius: 16px;
      --orange: #ff9500;
      --orange-light: #fff3e0;
      --blue: #3b82f6;
      --blue-light: #eff6ff;
      --purple: #8b5cf6;
      --purple-light: #f5f3ff;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding-bottom: 88px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      padding: 0 16px;
      animation: fadeIn 0.4s ease;
    }

    /* ---- Top Bar ---- */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .top-bar h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .settings-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--white);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .settings-btn:active {
      transform: scale(0.92);
    }

    /* ---- Profile Card ---- */
    .profile-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(145deg, #58CC02, #46a302);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 16px;
      box-shadow: 0 6px 24px rgba(88, 204, 2, 0.3);
    }

    .profile-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .profile-email {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .profile-joined {
      display: inline-block;
      margin-top: 12px;
      background: var(--primary-light);
      color: var(--primary-dark);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    /* ---- Stats Grid ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .profile-stat {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .profile-stat:active {
      transform: scale(0.97);
    }

    .profile-stat-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .profile-stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
    }

    .profile-stat-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .stat-streak {
      background: linear-gradient(145deg, #fff8f0, #fff3e0);
      border: 2px solid #ffe0b2;
    }

    .stat-score {
      background: linear-gradient(145deg, #f0fdf4, #dcfce7);
      border: 2px solid #bbf7d0;
    }

    .stat-lessons {
      background: linear-gradient(145deg, #eff6ff, #dbeafe);
      border: 2px solid #bfdbfe;
    }

    .stat-coins {
      background: linear-gradient(145deg, #fffbeb, #fef3c7);
      border: 2px solid #fde68a;
    }

    .stat-energy {
      background: linear-gradient(145deg, #f0fdf4, #dcfce7);
      border: 2px solid #bbf7d0;
    }

    /* ---- Achievement Section ---- */
    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .achievements-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }

    .achievement {
      background: var(--white);
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .achievement.locked {
      opacity: 0.4;
      filter: grayscale(1);
    }

    .achievement:active {
      transform: scale(0.95);
    }

    .achievement-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .achievement-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    /* ---- Progress Bar ---- */
    .progress-section {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 32px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .progress-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .progress-header span {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .progress-track {
      height: 12px;
      background: var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #58CC02, #7de836);
      border-radius: 6px;
      transition: width 0.8s ease;
    }

    /* ---- Logout ---- */
    .logout-section {
      padding-bottom: 24px;
    }

    .btn-logout {
      width: 100%;
      padding: 16px;
      background: var(--white);
      color: var(--danger);
      border: 2px solid #fecaca;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }

    .btn-logout:active {
      transform: scale(0.97);
    }

    .btn-logout:hover {
      background: #fef2f2;
    }

    /* ---- Bottom Navigation ---- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      z-index: 100;
    }

    .bottom-nav-inner {
      width: 100%;
      max-width: 420px;
      display: flex;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 0 8px;
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    .nav-item .nav-icon {
      font-size: 24px;
    }

    .nav-item .nav-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .nav-item.active .nav-label {
      color: var(--primary);
    }

    .nav-item:not(.active) .nav-label {
      color: var(--text-muted);
    }

    /* ---- Animations ---- */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-delay-1 { animation: slideUp 0.5s ease 0.1s both; }
    .animate-delay-2 { animation: slideUp 0.5s ease 0.2s both; }
    .animate-delay-3 { animation: slideUp 0.5s ease 0.3s both; }
    .animate-delay-4 { animation: slideUp 0.5s ease 0.4s both; }
    .animate-delay-5 { animation: slideUp 0.5s ease 0.5s both; }
  </style>
</head>
<body>
  <div class="page">
    <!-- Top Bar -->
    <div class="top-bar">
      <h1>Profile</h1>
      <button class="settings-btn" aria-label="Settings">⚙️</button>
    </div>

    <!-- Profile Card -->
    <div class="profile-card animate-delay-1">
      <div class="profile-avatar" id="profileAvatar">👤</div>
      <div class="profile-name" id="profileName">Learner</div>
      <div class="profile-email" id="profileEmail">email@example.com</div>
      <div class="profile-joined">🎓 EduBite Learner</div>
    </div>

    <!-- Stats -->
    <div class="stats-grid animate-delay-2">
      <div class="profile-stat stat-streak">
        <div class="profile-stat-icon">🔥</div>
        <div class="profile-stat-value" id="statStreak">0</div>
        <div class="profile-stat-label">Day Streak</div>
      </div>
      <div class="profile-stat stat-score">
        <div class="profile-stat-icon">⭐</div>
        <div class="profile-stat-value" id="statScore">0</div>
        <div class="profile-stat-label">Total Score</div>
      </div>
      <div class="profile-stat stat-lessons">
        <div class="profile-stat-icon">📚</div>
        <div class="profile-stat-value" id="statLessons">0</div>
        <div class="profile-stat-label">Lessons Done</div>
      </div>
      <div class="profile-stat stat-coins">
        <div class="profile-stat-icon">💰</div>
        <div class="profile-stat-value" id="statCoins">0</div>
        <div class="profile-stat-label">Coins</div>
      </div>
      <div class="profile-stat stat-energy">
        <div class="profile-stat-icon">⚡</div>
        <div class="profile-stat-value" id="statEnergy">20</div>
        <div class="profile-stat-label">Energy</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-section animate-delay-3">
      <div class="progress-header">
        <h3>Course Progress</h3>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Achievements -->
    <div class="animate-delay-4">
      <h2 class="section-title">Achievements</h2>
      <div class="achievements-grid" id="achievementsGrid"></div>
    </div>

    <!-- Logout -->
    <div class="logout-section animate-delay-5">
      <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="home.html" class="nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="tutor.html" class="nav-item">
        <span class="nav-icon">🤖</span>
        <span class="nav-label">AI Tutor</span>
      </a>
      <a href="profile.html" class="nav-item active">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </a>
    </div>
  </nav>

  <script>
    /* ============================================
       PROFILE.HTML — User Profile & Stats
       ============================================ */

    /**
     * Authentication guard.
     */
    function checkAuth() {
      const currentUser = localStorage.getItem('currentUser');
      if (!currentUser) {
        window.location.href = 'login.html';
        return null;
      }
      return JSON.parse(currentUser);
    }

    /**
     * Gets user progress data.
     */
    function getUserProgress(userId) {
      const allProgress = JSON.parse(localStorage.getItem('progress') || '[]');
      return allProgress.find(p => p.userId === userId) || {
        userId: userId,
        completedLessons: [],
        totalScore: 0,
        streak: 0,
        lastAccess: null,
        energy: 20,
        coins: 0,
        lastEnergyRefill: Date.now()
      };
    }

    /**
     * Extracts username from email.
     */
    function getUserName(email) {
      const name = email.split('@')[0];
      return name.charAt(0).toUpperCase() + name.slice(1);
    }

    /**
     * Gets the first letter of the email for avatar.
     */
    function getAvatarInitial(email) {
      return email.charAt(0).toUpperCase();
    }

    /**
     * Defines achievement badges with unlock conditions.
     */
    function getAchievements(progress, totalLessons) {
      return [
        {
          icon: '🌟',
          name: 'First Step',
          unlocked: progress.completedLessons.length >= 1
        },
        {
          icon: '🔥',
          name: '3-Day Streak',
          unlocked: progress.streak >= 3
        },
        {
          icon: '📚',
          name: 'Bookworm',
          unlocked: progress.completedLessons.length >= 5
        },
        {
          icon: '🧭',
          name: 'Explorer',
          unlocked: progress.completedLessons.length >= 10
        },
        {
          icon: '🏆',
          name: 'Week Warrior',
          unlocked: progress.streak >= 7
        },
        {
          icon: '💯',
          name: 'High Scorer',
          unlocked: progress.totalScore >= 30
        },
        {
          icon: '🌍',
          name: 'Polyglot',
          unlocked: progress.completedLessons.length >= 15
        },
        {
          icon: '🧠',
          name: 'Scholar',
          unlocked: progress.totalScore >= 50
        },
        {
          icon: '🎓',
          name: 'Graduated',
          unlocked: progress.completedLessons.length >= totalLessons
        }
      ];
    }

    /**
     * Renders achievement badges.
     */
    function renderAchievements(achievements) {
      const container = document.getElementById('achievementsGrid');
      container.innerHTML = achievements.map(a => `
        <div class="achievement ${a.unlocked ? '' : 'locked'}">
          <div class="achievement-icon">${a.icon}</div>
          <div class="achievement-name">${a.name}</div>
        </div>
      `).join('');
    }

    /**
     * Handles user logout.
     */
    function handleLogout() {
      if (confirm('Are you sure you want to sign out?')) {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
      }
    }

    /**
     * Initializes the profile page.
     */
    function initProfile() {
      const user = checkAuth();
      if (!user) return;

      const progress = getUserProgress(user.id);
      const lessons = JSON.parse(localStorage.getItem('lessons') || '[]');
      const totalLessons = lessons.length;
      const completedCount = progress.completedLessons.length;

      // Profile info
      document.getElementById('profileName').textContent = getUserName(user.email);
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('profileAvatar').textContent = getAvatarInitial(user.email);

      // Stats
      document.getElementById('statStreak').textContent = progress.streak;
      document.getElementById('statScore').textContent = progress.totalScore;
      document.getElementById('statLessons').textContent = completedCount;
      document.getElementById('statCoins').textContent = progress.coins || 0;
      document.getElementById('statEnergy').textContent = (progress.energy || 0) + '/20';

      // Course progress
      const percent = totalLessons > 0 ? Math.round((completedCount / totalLessons) * 100) : 0;
      document.getElementById('progressPercent').textContent = percent + '%';
      setTimeout(() => {
        document.getElementById('progressFill').style.width = percent + '%';
      }, 300);

      // Achievements
      const achievements = getAchievements(progress, totalLessons);
      renderAchievements(achievements);
    }

    // Initialize
    initProfile();
  </script>
</body>
</html>
