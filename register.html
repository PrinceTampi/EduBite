<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your EduBite account and start learning in 5 minutes a day.">
  <title>Register – EduBite</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #58CC02;
      --primary-dark: #46a302;
      --bg: #F7F7F7;
      --white: #FFFFFF;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --danger: #ef4444;
      --success: #22c55e;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.06);
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.5s ease;
    }

    .auth-header {
      text-align: center;
      padding: 48px 0 40px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #58CC02, #46a302);
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(88, 204, 2, 0.25);
      margin-bottom: 24px;
    }

    .auth-header h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 8px;
      font-weight: 500;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(88, 204, 2, 0.12);
    }

    .form-group input::placeholder {
      color: #9ca3af;
    }

    .password-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(145deg, #58CC02, #4cb801);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(88, 204, 2, 0.3);
      margin-top: 8px;
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(88, 204, 2, 0.4);
    }

    .error-msg {
      background: #fef2f2;
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      display: none;
      animation: shake 0.4s ease;
    }

    .success-msg {
      background: #f0fdf4;
      color: var(--success);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      display: none;
      animation: slideUp 0.3s ease;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 15px;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 700;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="auth-header">
      <div class="logo-icon">🧠</div>
      <h1>Create Account</h1>
      <p>Join EduBite and learn something new daily</p>
    </div>

    <div class="auth-card">
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="registerForm" autocomplete="off">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required>
          <p class="password-hint">Must be at least 6 characters</p>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
        </div>

        <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
      </form>
    </div>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Sign In</a>
    </p>
  </div>

  <script>
    /* ============================================
       REGISTER.HTML — User Registration
       ============================================ */

    /**
     * Displays an error message.
     */
    function showError(message) {
      const el = document.getElementById('errorMsg');
      document.getElementById('successMsg').style.display = 'none';
      el.textContent = message;
      el.style.display = 'block';
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'shake 0.4s ease';
    }

    /**
     * Displays a success message.
     */
    function showSuccess(message) {
      const el = document.getElementById('successMsg');
      document.getElementById('errorMsg').style.display = 'none';
      el.textContent = message;
      el.style.display = 'block';
    }

    /**
     * Generates a unique user ID.
     */
    function generateId() {
      return 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
    }

    /**
     * Validates inputs and creates a new user account.
     */
    function handleRegister(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (!email || !password || !confirmPassword) {
        showError('Please fill in all fields.');
        return;
      }

      if (!email.includes('@') || !email.includes('.')) {
        showError('Please enter a valid email address.');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      // Check if email already exists
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      if (users.find(u => u.email === email)) {
        showError('An account with this email already exists.');
        return;
      }

      // Create new user
      const newUser = {
        id: generateId(),
        email: email,
        password: password
      };
      users.push(newUser);
      localStorage.setItem('users', JSON.stringify(users));

      // Initialize progress for new user
      let allProgress = JSON.parse(localStorage.getItem('progress') || '[]');
      allProgress.push({
        userId: newUser.id,
        completedLessons: [],
        totalScore: 0,
        streak: 0,
        lastAccess: null,
        energy: 20,
        coins: 0,
        lastEnergyRefill: Date.now()
      });
      localStorage.setItem('progress', JSON.stringify(allProgress));

      // Show success and redirect
      showSuccess('Account created successfully! Redirecting...');
      const btn = document.getElementById('registerBtn');
      btn.textContent = 'Redirecting...';
      btn.disabled = true;

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    }

    // If already logged in, redirect
    if (localStorage.getItem('currentUser')) {
      window.location.href = 'home.html';
    }

    document.getElementById('registerForm').addEventListener('submit', handleRegister);
  </script>
</body>
</html>
