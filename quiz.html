<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EduBite Quiz – Test your knowledge with interactive questions.">
  <title>Quiz – EduBite</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #58CC02;
      --primary-dark: #46a302;
      --primary-light: #d4f5b0;
      --bg: #F7F7F7;
      --white: #FFFFFF;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --success: #22c55e;
      --success-light: #f0fdf4;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.06);
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 420px;
      padding: 0 16px;
      animation: fadeIn 0.4s ease;
    }

    /* ---- Top Bar ---- */
    .quiz-topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .close-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--white);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s;
      flex-shrink: 0;
      font-weight: 700;
      color: var(--text-muted);
    }

    .close-btn:active {
      transform: scale(0.92);
    }

    .progress-bar-container {
      flex: 1;
      height: 10px;
      background: var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #58CC02, #7de836);
      border-radius: 5px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .quiz-counter {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ---- Question Section ---- */
    .question-section {
      padding: 24px 0;
    }

    .question-num-badge {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary-dark);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.35;
      letter-spacing: -0.3px;
    }

    /* ---- Options ---- */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 8px 0 32px;
    }

    .option-btn {
      width: 100%;
      padding: 18px 20px;
      background: var(--white);
      border: 2.5px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    .option-btn:hover {
      border-color: var(--primary);
      background: #fafffe;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .option-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    .option-btn.correct {
      border-color: var(--success);
      background: var(--success-light);
      color: #166534;
      pointer-events: none;
    }

    .option-btn.wrong {
      border-color: var(--danger);
      background: var(--danger-light);
      color: #991b1b;
      pointer-events: none;
    }

    .option-btn.dimmed {
      opacity: 0.5;
      pointer-events: none;
    }

    .option-letter {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .option-btn.selected .option-letter {
      background: var(--primary);
      color: white;
    }

    .option-btn.correct .option-letter {
      background: var(--success);
      color: white;
    }

    .option-btn.wrong .option-letter {
      background: var(--danger);
      color: white;
    }

    /* ---- Feedback ---- */
    .feedback-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .feedback-bar.show {
      transform: translateY(0);
    }

    .feedback-inner {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .feedback-inner.correct {
      background: var(--success);
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.4);
    }

    .feedback-inner.wrong {
      background: var(--danger);
      box-shadow: 0 8px 32px rgba(239, 68, 68, 0.4);
    }

    .feedback-text {
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .feedback-text span {
      display: block;
      font-size: 13px;
      font-weight: 500;
      opacity: 0.9;
      margin-top: 2px;
    }

    .feedback-next-btn {
      padding: 12px 24px;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      white-space: nowrap;
    }

    .feedback-next-btn:active {
      transform: scale(0.95);
    }

    .feedback-next-btn:hover {
      background: rgba(255,255,255,0.35);
    }

    /* ---- Animations ---- */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounceIn {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .animate-question {
      animation: slideUp 0.4s ease;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Top Bar -->
    <div class="quiz-topbar">
      <button class="close-btn" onclick="confirmExit()" aria-label="Exit quiz">✕</button>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <span class="quiz-counter" id="quizCounter">1/3</span>
    </div>

    <!-- Question Area -->
    <div id="questionArea">
      <div class="question-section animate-question" id="questionSection">
        <div class="question-num-badge" id="questionBadge">Question 1</div>
        <h1 class="question-text" id="questionText">Loading...</h1>
      </div>

      <div class="options-list" id="optionsList"></div>
    </div>
  </div>

  <!-- Feedback Bar -->
  <div class="feedback-bar" id="feedbackBar">
    <div class="feedback-inner" id="feedbackInner">
      <div class="feedback-text" id="feedbackText">
        Correct! 🎉
      </div>
      <button class="feedback-next-btn" id="feedbackNextBtn" onclick="nextQuestion()">
        Continue →
      </button>
    </div>
  </div>

  <script>
    /* ============================================
       QUIZ.HTML — Interactive Quiz Engine
       ============================================ */

    // State
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let selectedAnswer = null;
    let isAnswered = false;

    /**
     * Authentication guard.
     */
    function checkAuth() {
      const currentUser = localStorage.getItem('currentUser');
      if (!currentUser) {
        window.location.href = 'login.html';
        return null;
      }
      return JSON.parse(currentUser);
    }

    /**
     * Confirms exit from the quiz.
     */
    function confirmExit() {
      if (confirm('Are you sure you want to exit the quiz? Your progress will be lost.')) {
        window.location.href = 'home.html';
      }
    }

    /**
     * Shuffles an array using Fisher-Yates algorithm.
     */
    function shuffleArray(arr) {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    /**
     * Loads quiz questions for the current lesson.
     */
    function loadQuestions() {
      const lesson = JSON.parse(localStorage.getItem('currentLesson'));
      if (!lesson) {
        window.location.href = 'home.html';
        return;
      }

      const allQuizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
      questions = allQuizzes.filter(q => q.lessonId === lesson.id);

      if (questions.length === 0) {
        alert('No quiz questions found for this lesson.');
        window.location.href = 'home.html';
        return;
      }

      // Shuffle questions
      questions = shuffleArray(questions);
    }

    /**
     * Renders the current question and its options.
     */
    function renderQuestion() {
      if (currentIndex >= questions.length) {
        finishQuiz();
        return;
      }

      const q = questions[currentIndex];
      selectedAnswer = null;
      isAnswered = false;

      // Update header
      document.getElementById('questionBadge').textContent = `Question ${currentIndex + 1}`;
      document.getElementById('questionText').textContent = q.question;
      document.getElementById('quizCounter').textContent = `${currentIndex + 1}/${questions.length}`;

      // Update progress bar
      const progressPercent = (currentIndex / questions.length) * 100;
      document.getElementById('progressFill').style.width = progressPercent + '%';

      // Render options
      const optionsList = document.getElementById('optionsList');
      const letters = ['A', 'B', 'C', 'D'];
      const shuffledOptions = shuffleArray(q.options);

      optionsList.innerHTML = shuffledOptions.map((option, i) => `
        <button class="option-btn" data-answer="${option}" onclick="selectOption(this, '${option.replace(/'/g, "\\'")}')" id="option-${i}">
          <span class="option-letter">${letters[i]}</span>
          <span>${option}</span>
        </button>
      `).join('');

      // Animate question in
      const section = document.getElementById('questionSection');
      section.style.animation = 'none';
      section.offsetHeight;
      section.style.animation = 'slideUp 0.4s ease';

      // Hide feedback bar
      document.getElementById('feedbackBar').classList.remove('show');
    }

    /**
     * Handles option selection.
     */
    function selectOption(btn, answer) {
      if (isAnswered) return;
      isAnswered = true;

      const q = questions[currentIndex];
      const isCorrect = answer === q.correctAnswer;

      if (isCorrect) {
        score++;
        btn.classList.add('correct');
      } else {
        btn.classList.add('wrong');
        // Highlight correct answer
        document.querySelectorAll('.option-btn').forEach(b => {
          if (b.dataset.answer === q.correctAnswer) {
            b.classList.add('correct');
          }
        });
      }

      // Dim other options
      document.querySelectorAll('.option-btn').forEach(b => {
        if (!b.classList.contains('correct') && !b.classList.contains('wrong')) {
          b.classList.add('dimmed');
        }
      });

      // Show feedback
      showFeedback(isCorrect, q.correctAnswer);
    }

    /**
     * Shows the feedback bar with result.
     */
    function showFeedback(isCorrect, correctAnswer) {
      const bar = document.getElementById('feedbackBar');
      const inner = document.getElementById('feedbackInner');
      const text = document.getElementById('feedbackText');
      const nextBtn = document.getElementById('feedbackNextBtn');

      inner.className = 'feedback-inner ' + (isCorrect ? 'correct' : 'wrong');

      if (isCorrect) {
        text.innerHTML = 'Correct! 🎉<span>Great job, keep going!</span>';
      } else {
        text.innerHTML = `Wrong ❌<span>Correct answer: ${correctAnswer}</span>`;
      }

      const isLastQuestion = currentIndex >= questions.length - 1;
      nextBtn.textContent = isLastQuestion ? 'See Results →' : 'Continue →';

      bar.classList.add('show');
    }

    /**
     * Advances to the next question or finishes the quiz.
     */
    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= questions.length) {
        finishQuiz();
      } else {
        renderQuestion();
      }
    }

    /**
     * Finishes the quiz and saves the result.
     */
    function finishQuiz() {
      const lesson = JSON.parse(localStorage.getItem('currentLesson'));

      // Save quiz result
      const result = {
        lessonId: lesson.id,
        lessonTitle: lesson.title,
        score: score,
        total: questions.length,
        timestamp: Date.now()
      };
      localStorage.setItem('quizResult', JSON.stringify(result));

      // Navigate to results
      window.location.href = 'result.html';
    }

    /**
     * Initializes the quiz page.
     */
    function initQuiz() {
      const user = checkAuth();
      if (!user) return;

      loadQuestions();
      renderQuestion();
    }

    // Initialize
    initQuiz();
  </script>
</body>
</html>
